name: Release

# Đẩy tag dạng v* (vd: git tag v0.1.0 && git push origin v0.1.0) → build cả 3 OS
# rồi đính kèm bản đóng gói vào GitHub Release của tag đó.
# workflow_dispatch: chạy tay từ tab Actions để THỬ build (không tạo release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# Cần quyền ghi để tạo Release + upload asset.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Self-hosted runners: nhãn phải khớp lúc đăng ký runner.
          # Mặc định runner tự gắn 'self-hosted' + OS ('windows'/'linux') + arch.
          - os: [self-hosted, windows]
            label: windows
            build_cmd: powershell -ExecutionPolicy Bypass -File build/build.ps1
            venv_python: backend/.venv/Scripts/python.exe
          - os: [self-hosted, linux]
            label: linux
            build_cmd: bash build/build.sh
            venv_python: backend/.venv/bin/python
          # macOS: bật lại khi đã có runner — đổi 'os' thành [self-hosted, macOS]
          # (hoặc 'macos-latest' nếu dùng runner của GitHub) rồi bỏ comment.
          # - os: [self-hosted, macOS]
          #   label: macos
          #   build_cmd: bash build/build.sh
          #   venv_python: backend/.venv/bin/python
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup backend venv + deps
        shell: bash
        run: |
          python -m venv backend/.venv
          "${{ matrix.venv_python }}" -m pip install --upgrade pip
          "${{ matrix.venv_python }}" -m pip install -r backend/requirements.txt

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Build standalone bundle
        shell: bash
        run: ${{ matrix.build_cmd }}

      # Nén thư mục onedir dist/ImageWorkflow thành 1 file zip để tải về.
      # Dùng Python (đã setup) để không phụ thuộc CLI 'zip' trên self-hosted Linux.
      - name: Package
        shell: bash
        run: python -c "import shutil; shutil.make_archive('ImageWorkflow-${{ matrix.label }}', 'zip', 'dist', 'ImageWorkflow')"

      # Khi chạy tay (workflow_dispatch): lưu artifact để tải kiểm thử, KHÔNG release.
      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ImageWorkflow-${{ matrix.label }}
          path: ImageWorkflow-${{ matrix.label }}.zip

      # Khi push tag v*: đính file zip vào Release của tag (mỗi OS upload phần của nó).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ImageWorkflow-${{ matrix.label }}.zip
          fail_on_unmatched_files: true
