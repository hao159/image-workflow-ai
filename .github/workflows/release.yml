name: Release

# Đẩy tag dạng v* (vd: git tag v0.1.0 && git push origin v0.1.0) → build cả 3 OS
# rồi đính kèm bản đóng gói vào GitHub Release của tag đó.
# workflow_dispatch: chạy tay từ tab Actions để THỬ build (không tạo release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag để tạo Release (vd: v0.1.0). Bỏ trống = chỉ build artifact, không release."
        required: false
        default: ""

# Cần quyền ghi để tạo Release + upload asset.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Self-hosted runners: nhãn phải khớp lúc đăng ký runner.
          # Mặc định runner tự gắn 'self-hosted' + OS ('windows'/'linux') + arch.
          - os: [self-hosted, windows]
            label: windows
          - os: [self-hosted, linux]
            label: linux
          # macOS: bật lại khi đã có runner — thêm bước "Build & package (macOS)"
          # dùng bash giống Linux rồi thêm '- os: [self-hosted, macOS] / label: macos'.
          # - os: [self-hosted, macOS]
          #   label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Mỗi OS chạy bằng shell GỐC của nó — KHÔNG ép 'shell: bash' vì runner tự host
      # Windows không chắc có bash trên PATH (gây 'bash: command not found').
      # Windows: python / PowerShell. Linux: python3 / bash.

      # --- Chẩn đoán môi trường runner (không làm fail job) ---
      # In ra PATH + vị trí/phiên bản Python mà SERVICE runner thực sự thấy.
      # Khác với shell tương tác của bạn nếu runner chưa restart sau khi cài Python.
      - name: Diagnose runner Python (Windows)
        if: matrix.label == 'windows'
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "=== PATH ==="; $env:PATH -split ';'
          Write-Host "=== Get-Command python / py / python3 ==="
          foreach ($c in 'python','py','python3') { Get-Command $c -ErrorAction SilentlyContinue | Select-Object Name,Source }
          Write-Host "=== Thư mục Python đã cài ==="
          Get-ChildItem 'C:\Program Files\Python*','C:\Python*',"$env:LOCALAPPDATA\Programs\Python" -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Diagnose runner Python (Linux)
        if: matrix.label == 'linux'
        shell: bash
        continue-on-error: true
        run: |
          echo "=== PATH ==="; echo "$PATH"
          echo "=== which -a ==="; which -a python3 python3.12 python || true
          echo "=== versions ==="; python3 --version || true; python3.12 --version || true

      # --- Windows (PowerShell 5.1 luôn có sẵn) ---
      - name: Build & package (Windows)
        if: matrix.label == 'windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          # Tự dò Python >=3.10. Ưu tiên 'py' launcher (py.exe ở C:\Windows nên service
          # luôn thấy, kể cả khi 'python' chưa lên PATH / runner chưa restart sau khi cài).
          $check = "import sys; sys.exit(0 if sys.version_info[:2] >= (3,10) else 1)"
          function Test-Py($exe, $pre) {
            try {
              if ($pre) { & $exe $pre -c $check 2>$null } else { & $exe -c $check 2>$null }
              return ($LASTEXITCODE -eq 0)
            } catch { return $false }
          }
          if     (Test-Py 'py' '-3.12') { $PYEXE = 'py'; $PYPRE = '-3.12' }
          elseif (Test-Py 'py' '-3')    { $PYEXE = 'py'; $PYPRE = '-3' }
          elseif (Test-Py 'python' '')  { $PYEXE = 'python'; $PYPRE = '' }
          else { throw "Khong tim thay Python >=3.10. Cai python.org 3.12 (All Users + py launcher) roi RESTART runner service." }
          if ($PYPRE) { & $PYEXE $PYPRE --version } else { & $PYEXE --version }
          Write-Host "Dung Python: $PYEXE $PYPRE"
          node --version
          npm --version
          if ($PYPRE) { & $PYEXE $PYPRE -m venv backend/.venv } else { & $PYEXE -m venv backend/.venv }
          if ($LASTEXITCODE -ne 0) { throw "venv creation failed" }
          & "backend/.venv/Scripts/python.exe" -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { throw "pip upgrade failed" }
          & "backend/.venv/Scripts/python.exe" -m pip install -r backend/requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "pip install failed" }
          npm ci --prefix frontend
          if ($LASTEXITCODE -ne 0) { throw "npm ci failed" }
          powershell -ExecutionPolicy Bypass -File build/build.ps1
          if ($LASTEXITCODE -ne 0) { throw "build.ps1 failed" }
          & "backend/.venv/Scripts/python.exe" -c "import shutil; shutil.make_archive('ImageWorkflow-windows', 'zip', 'dist', 'ImageWorkflow')"
          if ($LASTEXITCODE -ne 0) { throw "packaging failed" }

      # --- Linux (bash) ---
      # Tự dò Python >=3.10 (pillow>=11 cần >=3.10). 'python3' mặc định có thể là 3.8,
      # nên thử 'python3.12'/'python3.13' trước. Báo lỗi rõ nếu runner chưa có 3.10+.
      - name: Build & package (Linux)
        if: matrix.label == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          # pyenv: runner (shell không tương tác) KHÔNG source ~/.bashrc nên không có
          # shims trên PATH. Tự thêm vào để thấy Python do pyenv quản lý (vd 3.12).
          if [ -d "$HOME/.pyenv" ]; then
            export PYENV_ROOT="$HOME/.pyenv"
            export PATH="$PYENV_ROOT/shims:$PYENV_ROOT/bin:$PATH"
          fi
          PY=""
          for c in python3.12 python3.13 python3 python; do
            if command -v "$c" >/dev/null 2>&1 && "$c" -c 'import sys; raise SystemExit(0 if sys.version_info[:2] >= (3,10) else 1)' 2>/dev/null; then
              PY="$c"; break
            fi
          done
          if [ -z "$PY" ]; then
            echo "Không tìm thấy Python >=3.10 trên runner (python3 hiện tại: $(python3 --version 2>&1 || echo 'không có'))." >&2
            echo "Cài qua pyenv: pyenv install 3.12 && pyenv global 3.12  — hoặc deadsnakes." >&2
            exit 1
          fi
          echo "Dùng Python: $PY ($("$PY" --version))"
          node --version
          npm --version
          "$PY" -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/python -m pip install -r backend/requirements.txt
          npm ci --prefix frontend
          bash build/build.sh
          backend/.venv/bin/python -c "import shutil; shutil.make_archive('ImageWorkflow-linux', 'zip', 'dist', 'ImageWorkflow')"

      # Khi chạy tay (workflow_dispatch): lưu artifact để tải kiểm thử, KHÔNG release.
      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ImageWorkflow-${{ matrix.label }}
          path: ImageWorkflow-${{ matrix.label }}.zip

      # Đính file zip vào GitHub Release (mỗi OS upload phần của nó vào cùng 1 release):
      #  - push tag v*      → tag_name rỗng → action dùng github.ref (tag vừa push).
      #  - workflow_dispatch + nhập 'tag' → tạo release với tag đó tại commit hiện tại.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ImageWorkflow-${{ matrix.label }}.zip
          fail_on_unmatched_files: true
